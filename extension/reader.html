<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>갈피 — 광고 없이 읽기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="reader.css">
</head>
<body>
<header class="mast">
  <div class="ribbon" aria-hidden="true">갈피</div>
  <div class="mast-info">
    <div class="mast-title" id="m-title"></div>
    <div class="mast-meta"><span id="m-site"></span><span id="m-byline"></span><a id="m-origin" target="_blank" rel="noopener">원문 페이지 열기 ⧉</a></div>
  </div>
</header>

<div class="error" id="error"></div>

<div class="spread" id="spread">
  <!-- 왼쪽: 갈피(브리핑) -->
  <aside class="brief-col">
    <article class="brief-paper">
      <h2 id="b-headline"></h2>
      <div class="byline"><span>독자 수준 <b id="b-level"></b></span></div>

      <p class="section-label">읽기 전 브리핑</p>
      <div class="briefing" id="b-briefing"></div>

      <p class="section-label">전제하는 것들 <span class="label-hint">카드를 누르면 본문에서 찾아갑니다</span></p>
      <div id="b-concepts"></div>

      <p class="section-label" id="b-bg-label">답해주지 않는 배경</p>
      <div id="b-background"></div>

      <p class="section-label">이렇게 읽으세요</p>
      <div id="b-path"></div>

      <div class="takeaway"><span class="label">이 글이 중요한 이유</span><span id="b-takeaway"></span></div>
      <p class="disclaimer">
        <b>일반 지식</b> 표시는 기사 밖의 통상적 설명입니다. 이 사건의 사실은 기사 기준이며,
        법률·투자 자문이 아닙니다. 기사 본문은 이 탭에만 있으며 어디에도 저장되지 않습니다.
      </p>
    </article>
  </aside>

  <!-- 오른쪽: 기사 본문 (Readability 추출, 광고 없음) -->
  <main class="article-col">
    <article class="article-paper">
      <h1 id="a-title"></h1>
      <div class="a-byline" id="a-byline"></div>
      <div class="article-body" id="a-body"></div>
    </article>
  </main>
</div>

<script src="reader.js"></script>
</body>
</html>
